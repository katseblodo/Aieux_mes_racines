<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aïeux, mes racines - Arbre Graphique</title>
    <style>
        :root {
            --male: #3498db;
            --female: #e74c3c;
            --bg: #f8f9fa;
            --text: #2c3e50;
            --line-color: #bdc3c7;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding-top: 160px;
            color: var(--text);
        }

        /* HEADER FIXE */
        .header-tools {
            position: fixed; top: 0; width: 100%; background: #ffffff;
            padding: 20px; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .nav-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        
        button {
            padding: 8px 18px; border-radius: 20px; border: 1px solid #ddd;
            background: white; cursor: pointer; transition: all 0.3s;
            font-weight: 500;
        }

        button:hover { background: #eee; }
        button.active-gen { background: #2c3e50; color: white; border-color: #2c3e50; }

        select { padding: 8px; border-radius: 5px; border: 1px solid #ddd; }

        /* STRUCTURE DE L'ARBRE (Mode Organigramme) */
        #tree-container {
            display: flex;
            justify-content: center;
            padding: 40px;
            overflow-x: auto;
        }

        .tree-level {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            position: relative;
        }

        /* CARTES MODERNES */
        .card {
            background: white;
            width: 200px;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #ccc;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .card.M { border-left-color: var(--male); }
        .card.F { border-left-color: var(--female); }

        .sosa-badge {
            font-size: 0.65em;
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            color: #666;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 5px;
        }

        .name { 
            font-weight: 700; 
            font-size: 0.9em; 
            display: block; 
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .job { 
            font-size: 0.75em; 
            color: #16a085; 
            display: block; 
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .details { 
            font-size: 0.7em; 
            color: #7f8c8d; 
            border-top: 1px solid #f0f0f0;
            padding-top: 5px;
        }

        /* LABEL GÉNÉRATION SUR LE CÔTÉ */
        .gen-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .gen-title {
            width: 100%;
            text-align: center;
            font-size: 0.8em;
            color: #bdc3c7;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .gen-title::before, .gen-title::after {
            content: ""; flex: 1; height: 1px; background: #eee; margin: 0 15px;
        }

    </style>
</head>
<body>

<div id="menu-container"></div>

<div class="header-tools">
    <div class="nav-row">
        <strong>Période :</strong>
        <button onclick="updateView(0, 2, this)" class="active-gen">0 - 2 (Proches)</button>
        <button onclick="updateView(3, 5, this)">3 - 5</button>
        <button onclick="updateView(6, 8, this)">6 - 8</button>
        <button onclick="updateView(8, 12, this)">Ancêtres lointains</button>
    </div>
    <div class="nav-row">
        <strong>Branche :</strong>
        <select id="familyFilter" onchange="renderTree()">
            <option value="all">Toute la famille</option>
            <option value="TT">Famille TANGUY</option>
            <option value="LL">Famille LÉAUTÉ</option>
            <option value="QQ">Famille QUILLEC</option>
            <option value="PP">Famille PAJOLLEC</option>
        </select>
    </div>
</div>

<div id="tree-container">Initialisation de la généalogie...</div>

<script>
    let allIndividuals = [];
    let minGen = 0, maxGen = 2;
    const baseUrl = "https://katseblodo.github.io/Aieux_mes_racines/fiche_couple.html";

    async function loadCSV() {
        try {
            const response = await fetch('individus_nettoye.csv');
            const data = await response.text();
            parseData(data);
            renderTree();
        } catch (e) {
            document.getElementById('tree-container').innerHTML = "Erreur de chargement des données CSV.";
        }
    }

    function parseData(csvText) {
        const lines = csvText.trim().split('\n');
        allIndividuals = lines.map(line => {
            const f = line.split(';');
            const name = f[3] || "";
            // Détection simple du sexe par le prénom
            const isFem = /marie|paule|anne|marguerite|helene|philomene|reine|jeanne|louise|yvonne/i.test(name);
            
            return {
                sosa: parseInt(f[0]), 
                gen: parseInt(f[1]?.replace('G','') || 0),
                code: f[2] || "",
                name: name,
                job: f[4] || "",
                dates: `${f[5] || '?'} — ${f[6] || '?'}`,
                place: f[7] || "",
                sex: isFem ? 'F' : 'M'
            };
        });
    }

    function renderTree() {
        const container = document.getElementById('tree-container');
        const filter = document.getElementById('familyFilter').value;
        container.innerHTML = '<div style="width:100%"></div>';
        const wrapper = container.firstChild;

        for (let g = minGen; g <= maxGen; g++) {
            const people = allIndividuals
                .filter(i => i.gen === g && (filter === 'all' || i.code.includes(filter)))
                .sort((a, b) => a.sosa - b.sosa);

            if (people.length > 0) {
                const genGroup = document.createElement('div');
                genGroup.className = 'gen-group';
                
                genGroup.innerHTML = `<div class="gen-title">Génération ${g}</div>`;
                
                const row = document.createElement('div');
                row.className = 'tree-level';

                people.forEach(p => {
                    const card = document.createElement('a');
                    card.href = `${baseUrl}?sosa=${p.sosa}`;
                    card.className = `card ${p.sex}`;
                    card.innerHTML = `
                        <span class="sosa-badge">SOSA ${p.sosa}</span>
                        <span class="name">${p.name}</span>
                        ${p.job ? `<span class="job">${p.job}</span>` : ''}
                        <div class="details">
                            📅 ${p.dates}<br>
                            📍 ${p.place}
                        </div>
                    `;
                    row.appendChild(card);
                });
                
                genGroup.appendChild(row);
                wrapper.appendChild(genGroup);
            }
        }
    }

    function updateView(min, max, btn) {
        minGen = min; maxGen = max;
        document.querySelectorAll('.nav-row button').forEach(b => b.classList.remove('active-gen'));
        btn.classList.add('active-gen');
        renderTree();
    }

    window.onload = loadCSV;

    // Menu dynamique
    fetch('menu.html')
        .then(res => res.text())
        .then(html => document.getElementById('menu-container').innerHTML = html)
        .catch(err => console.log("Menu non trouvé"));
</script>

</body>
</html>
