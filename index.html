<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Aïeux, mes racines</title>
    <style>
        :root {
            --male: #3498db;
            --female: #e74c3c;
            --bg: #fdfdfd;
            --line-color: #bdc3c7;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding-top: 130px; }

        /* HEADER */
        .header-tools {
            position: fixed; top: 0; width: 100%; background: #2c3e50;
            color: white; padding: 15px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .nav-row { display: flex; gap: 15px; align-items: center; }
        button, select { padding: 8px 15px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.9em; }
        .active-gen { background: #1abc9c; color: white; font-weight: bold; }

        /* ARBRE ET CONNEXIONS */
        #tree-container {
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; min-width: fit-content; position: relative;
        }

        .generation-row {
            display: flex; justify-content: center; gap: 40px; width: 100%;
            position: relative; padding: 30px 0;
        }

        /* Lignes de connexion verticales */
        .generation-row::after {
            content: ''; position: absolute; bottom: -30px; left: 50%;
            width: 2px; height: 30px; background: var(--line-color);
        }
        .generation-row:last-child::after { display: none; }

        .gen-label {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            font-weight: bold; color: #95a5a6; background: #eee;
            padding: 5px 10px; border-radius: 4px; font-size: 0.8em;
        }

        /* CARTES */
        .card {
            background: white; width: 220px; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #ccc;
            position: relative; z-index: 2;
        }

        .card.M { border-top-color: var(--male); }
        .card.F { border-top-color: var(--female); }

        .name { font-weight: bold; font-size: 1em; display: block; color: #2c3e50; margin-bottom: 5px; }
        .job { font-size: 0.85em; color: #16a085; font-style: italic; display: block; margin-bottom: 5px; }
        .details { font-size: 0.75em; color: #7f8c8d; line-height: 1.4; }
        
        .error-msg { color: #e74c3c; background: #fadbd8; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
<div id="menu-container"></div>
<div class="header-tools">
    <div class="nav-row">
        <strong>Période :</strong>
        <button onclick="updateView(0, 3, this)" class="active-gen">G0 à G3</button>
        <button onclick="updateView(4, 7, this)">G4 à G7</button>
        <button onclick="updateView(8, 12, this)">G8 à G12</button>
    </div>
    <div class="nav-row">
        <strong>Branche :</strong>
        <select id="familyFilter" onchange="renderTree()">
            <option value="all">Toutes les lignées</option>
            <option value="TT">TANGUY (TT)</option>
            <option value="LL">LÉAUTÉ (LL)</option>
            <option value="QQ">QUILLEC (QQ)</option>
            <option value="PP">PAJOLLEC (PP)</option>
        </select>
    </div>
</div>

<div id="tree-container">
    <p>Chargement des données généalogiques...</p>
</div>

<script>
    let allIndividuals = [];
    let minGen = 0;
    let maxGen = 3;

    // 1. CHARGEMENT DU FICHIER CSV
    async function loadCSV() {
        try {
            // Nom du fichier avec mes aieux 'individus_nettoyé.csv'
            const response = await fetch('individus_nettoye.csv');
            if (!response.ok) throw new Error("Fichier CSV non trouvé");
            
            const data = await response.text();
            parseData(data);
            renderTree();
        } catch (error) {
            document.getElementById('tree-container').innerHTML = 
                `<div class="error-msg">Erreur : ${error.message}<br>Assurez-vous que le fichier CSV est dans le même dossier et que vous utilisez un serveur local.</div>`;
        }
    }

    // 2. PARSING DES DONNÉES
    function parseData(csvText) {
        const lines = csvText.trim().split('\n');
        allIndividuals = lines.map(line => {
            const f = line.split(';');
            const name = f[3] || "";
            // Détection du sexe basée sur les prénoms
            const isFem = /marie|paule|anne|marguerite|helene|philomene|reine|jeanne/i.test(name);
            
            return {
                id: f[0],
                gen: parseInt(f[1]?.replace('G','') || 0),
                code: f[2] || "",
                name: name,
                job: f[4] || "",
                birth: f[5] || "",
                death: f[6] || "",
                place: f[7] || "",
                sex: isFem ? 'F' : 'M'
            };
        });
    }

    // 3. AFFICHAGE
    function renderTree() {
        const container = document.getElementById('tree-container');
        const filter = document.getElementById('familyFilter').value;
        container.innerHTML = '';

        for (let g = minGen; g <= maxGen; g++) {
            const peopleInGen = allIndividuals.filter(i => 
                i.gen === g && (filter === 'all' || i.code.includes(filter))
            );

            if (peopleInGen.length > 0) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'generation-row';
                rowDiv.innerHTML = `<div class="gen-label">Génération ${g}</div>`;

                peopleInGen.forEach(p => {
                    rowDiv.innerHTML += `
                        <div class="card ${p.sex}">
                            <span class="name">${p.name.toUpperCase()}</span>
                            ${p.job ? `<span class="job">${p.job}</span>` : ''}
                            <div class="details">
                                📅 ${p.birth} — ${p.death}<br>
                                📍 ${p.place}
                            </div>
                        </div>
                    `;
                });
                container.appendChild(rowDiv);
            }
        }
        
        if (container.innerHTML === '') {
            container.innerHTML = "<p>Aucun résultat pour cette sélection.</p>";
        }
    }

    // 4. NAVIGATION
    function updateView(min, max, btn) {
        minGen = min;
        maxGen = max;
        document.querySelectorAll('.nav-row button').forEach(b => b.classList.remove('active-gen'));
        btn.classList.add('active-gen');
        renderTree();
    }

    // Lancement au chargement de la page
    window.onload = loadCSV;
</script>
<script>
    // Fonction pour charger le menu
    fetch('menu.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('menu-container').innerHTML = data;
        });
</script>
</body>
</html>
