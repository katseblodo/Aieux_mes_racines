<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        :root { 
            --main-text: #2c3e50; 
            --brown: #8b4513;
            --gold: #d4af37;
            --bg: #fdfcf9; /* Fond parchemin */
            --nav-bg: #fffaf0; /* Fond clair pour le menu */
        }
        
        body {
            font-family: 'Georgia', serif; /* Police historique */
            background-color: var(--bg);
            margin: 0;
        }

        .main-nav {
            background: var(--nav-bg);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px double var(--brown); /* Bordure style JJF */
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        
        .nav-brand h1 { 
            margin: 0; 
            font-size: 24px; 
            color: var(--brown); 
            text-transform: uppercase;
        }
        
        .nav-brand span { 
            font-size: 14px; 
            font-style: italic; 
            color: var(--gold); 
            font-weight: bold;
        }
        
        .nav-links { 
            display: flex; 
            gap: 15px; 
            align-items: center;
            flex-wrap: wrap;
        }
        
        .nav-links a,
        .dropdown-btn { 
            color: var(--brown);
            text-decoration: none; 
            font-weight: bold;
            padding: 8px 15px; 
            border-radius: 4px;
            border: 1px solid transparent;
            transition: all 0.3s;
            background: transparent;
            font-family: 'Georgia', serif;
            font-size: 16px;
            cursor: pointer;
        }
        
        .nav-links a:hover,
        .dropdown-btn:hover { 
            background: var(--bg); 
            border-color: var(--gold);
            color: #5d2e0a;
        }

        /* --- VOS PROPRES STYLES DE DROPDOWN (Adaptés en couleurs) --- */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.1);
            z-index: 1;
            border: 1px solid var(--brown);
            border-radius: 4px;
            top: 100%;
            left: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .dropdown-content a {
            color: var(--main-text);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            border-bottom: 1px solid #eee;
            border-radius: 0;
            font-weight: normal;
        }

        .dropdown-content a:last-child {
            border-bottom: none;
        }

        .dropdown-content a:hover {
            background-color: #f4f1ea;
            color: var(--brown);
            border-color: transparent;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .separator {
            height: 1px;
            background-color: #eee;
            margin: 0;
        }
        
        .empty {
            padding: 15px;
            color: #999;
            font-style: italic;
            text-align: center;
        }
    </style>
</head>

    <body>

<div class="main-nav">
    <div class="nav-brand">
        <h1>Aïeux, mes racines</h1>
        <span>Site de généalogie de Catherine Tanguy</span>
    </div>
    <div class="nav-links">
        <a href="index.html">🌳 L'Arbre</a>
        <a href="fiche_couple.html">🌳 Exploration</a>
        <a href="carte.html">🌍 Carte Globale</a>
        <a href="fiches/index.html"> 📋 Fiches</a>
        <a href="fiche_couple.html">👥 Fiche Couple</a>
        <a href="recherche.html">🔍 Recherche</a>
        <a href="synthese.html">🌳 En Chiffres</a>
        <a href="souverains.html">👑 Souverains</a>  
        <a href="http://cathtanguy.free.fr/genealogie/">🔗 Site d'origine</a>
    </div>
</div>

<script>
// Fonction pour charger les fiches depuis le répertoire
async function loadFiches() {
    const fichesMenu = document.getElementById('fiches-menu');
    
    try {
        // Utilise l'API GitHub pour lister les fichiers du répertoire fiches
        const response = await fetch('https://api.github.com/repos/katseblodo/Aieux_mes_racines/contents/fiches');
        const files = await response.json();
        
        // Vérifier si la réponse est un tableau (liste de fichiers)
        if (!Array.isArray(files)) {
            throw new Error('Format de réponse invalide');
        }
        
        // Filtrer les fichiers HTML et trier par nom
        const htmlFiles = files
            .filter(file => file.name.endsWith('.html'))
            .sort((a, b) => a.name.localeCompare(b.name));
        
        if (htmlFiles.length === 0) {
            fichesMenu.innerHTML = '<div class="empty">Aucune fiche disponible</div>';
            return;
        }
        
        // Créer les liens pour chaque fiche
        const ficheLinks = htmlFiles
            .map(file => {
                // Formater le nom : remplacer les underscores par des espaces et supprimer .html
                const nomFormate = file.name
                    .replace('.html', '')
                    .replace(/_/g, ' ')
                    .replace(/\b\w/g, char => char.toUpperCase()); // Capitaliser chaque mot
                
                return `
                    <a href="fiches/${file.name}" target="_blank" title="${nomFormate}">
                        <span class="fiche-name">📄 ${nomFormate}</span>
                    </a>
                `;
            })
            .join('<div class="separator"></div>');
        
        fichesMenu.innerHTML = ficheLinks;
        
    } catch (error) {
        console.error('Erreur lors du chargement des fiches:', error);
        fichesMenu.innerHTML = '<div class="empty">⚠️ Erreur de chargement</div>';
    }
}

// Charger les fiches au chargement de la page
document.addEventListener('DOMContentLoaded', loadFiches);
</script>

</body>
</html>
