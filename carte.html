<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cartographie - Aïeux, mes racines</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="js/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        /* Styles spécifiques à la carte qui ne vont pas dans le CSS commun */
        #map { 
            height: 600px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border: 2px solid var(--or);
            margin-bottom: 20px;
        }
        
        .filters { 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
            align-items: center;
            margin-bottom: 20px;
        }
        
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.9em; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #fff; }

        select { 
            padding: 8px; 
            border-radius: 4px; 
            border: 1px solid var(--or); 
            background: var(--creme);
            color: var(--sepia);
        }
        
        .stats-box { 
            font-weight: bold; 
            color: var(--brique); 
            margin-left: auto; 
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<header class="header-bigouden">
    <div class="header-content">
        <h1>Aïeux, mes racines</h1>
        <p class="author-signature">par Catherine Tanguy</p>
        <div class="tagline-frieze">
            <span class="site-tagline">Généalogie & histoires familiales</span>
        </div>
    </div>
</header>

<div id="menu-container"></div>

<div class="container">
    <div class="filters">
        <div>
            <strong>Siècle :</strong>
            <select id="selectSiecle" onchange="filtrerEtAfficher()">
                <option value="tous">Tous les siècles</option>
                <option value="16">XVIe siècle</option>
                <option value="17">XVIIe siècle</option>
                <option value="18">XVIIIe siècle</option>
                <option value="19">XIXe siècle</option>
                <option value="20">XXe siècle</option>
            </select>
        </div>
        <div class="stats-box" id="stats-villes">Chargement des données...</div>
    </div>

    <div id="map"></div>
    
    <div class="legend" id="couleurs-familles">
        <strong style="display: block; margin-bottom: 10px;">Légende des familles :</strong>
        </div>
</div>

<script>
    // Le reste de ton code JavaScript actuel (palette, initMap, chargerDonnees, etc.)
    // reste identique ici...
</script>
</body>
</html>
