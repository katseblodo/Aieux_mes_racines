<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style-recherche.css">
    <title>Géné-Expert v2</title>
</head>
<body>

<header>
    <h1><span style="color:var(--accent)">SOSA</span> EXPLORER</h1>
    <div style="display:flex; gap:10px;">
        <input type="number" id="input_sosa" placeholder="N° SOSA">
        <button class="btn-action" style="margin:0; padding:5px 20px;" onclick="chargerSosa(document.getElementById('input_sosa').value)">Charger</button>
    </div>
    <div id="nom_header" style="font-weight: bold; font-size: 1.2em;">Individu non chargé</div>
</header>

<div class="main-layout">
    <aside class="panel">
        <h3>Généalogie Directe</h3>
        <label>Père</label>
        <div id="parent_p" class="field-group">-</div>
        <label>Mère</label>
        <div id="parent_m" class="field-group">-</div>
        <hr>
        <label>Fratrie (via parents)</label>
        <div id="fratrie_list" style="font-size: 0.8em; color:#bbb;">Recherche auto...</div>
    </aside>

    <main class="panel">
        <h3>Données Militaires & Physiques</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <div class="field-group">
                <label>Classe</label>
                <input type="text" id="mil_classe">
            </div>
            <div class="field-group">
                <label>Bureau</label>
                <input type="text" placeholder="ex: Brest">
            </div>
            <div class="field-group">
                <label>Matricule</label>
                <input type="text" placeholder="n°">
            </div>
        </div>

        <h3>Investigation : Recensements</h3>
        <table>
            <thead>
                <tr><th>Année</th><th>Lieu</th><th>Source</th><th>Notes du foyer</th></tr>
            </thead>
            <tbody id="census_body"></tbody>
        </table>
    </main>

    <aside class="panel">
        <h3>Fichier JSON de l'Individu</h3>
        <textarea id="json_preview" style="height: 75%;"></textarea>
        <button class="btn-action" onclick="alert('Sauvegardé dans vos téléchargements')">💾 ENREGISTRER / METTRE À JOUR</button>
        <p style="font-size: 0.7em; color: gray; margin-top: 10px;">
            Ce fichier contient l'intégralité des indices de recherche (Physique, Notariat, Recensements).
        </p>
    </aside>
</div>

<script src="app.js"></script>
</body>
</html>
