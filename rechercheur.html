<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style-recherche.css">
    <title>Éditeur de Recherche Sosa</title>
</head>
<body>

<div class="container">
    <aside>
        <div class="card">
            <h3>Entourage Prédit</h3>
            <div class="sosa-nav">
                <span class="badge" id="pere-link">Père</span>
                <span class="badge" id="mere-link">Mère</span>
            </div>
            <div class="sosa-nav">
                <span class="badge" id="conjoint-link">Conjoint</span>
            </div>
            <hr>
            <h4>Fratrie</h4>
            <ul id="fratrie-list"></ul>
            <button onclick="ajouterFrereSoeur()">+ Ajouter un frère/sœur</button>
        </div>
    </aside>

    <main>
        <div class="card">
            <h2 id="sosa-title">Individu</h2>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="number" id="input-sosa" placeholder="Entrez un SOSA">
                <button onclick="chargerSosa(document.getElementById('input-sosa').value)">Charger</button>
            </div>
            
            <h3>Tableau des Recensements</h3>
            <table>
                <thead>
                    <tr>
                        <th>Année</th>
                        <th>Lieu</th>
                        <th>Page/Vue</th>
                        <th>Détails extraits</th>
                    </tr>
                </thead>
                <tbody id="recensement-body">
                    </tbody>
            </table>
            <p><small>Note: Saisissez les dates de naissance/décès pour filtrer les années.</small></p>
            <button onclick="genererGrilleRecensement(1880, 1940)">Simuler dates 1880-1940</button>
        </div>
    </main>

    <aside>
        <div class="card">
            <h3>Fichier de Recherche (JSON)</h3>
            <textarea id="json-output" rows="25" style="width:100%; font-family:monospace; font-size:11px;"></textarea>
            <button class="btn-save" onclick="alert('Copiez le texte ci-dessus dans un fichier .json')">Générer le fichier</button>
        </div>
    </aside>
</div>

<script src="app.js"></script>
</body>
</html>
