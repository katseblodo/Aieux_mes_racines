<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Archives de la Famille Quillec</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .index-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .card {
            background: white;
            padding: 25px;
            border: 1px solid #8b4513;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 150px;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.15);
            border-color: #d4af37;
        }
        .card h3 { 
            margin: 10px 0; 
            color: #8b4513; 
            font-size: 1.2em;
        }
        .card .file-name {
            font-size: 0.8em;
            color: #95a5a6;
            margin-top: auto;
            font-family: monospace;
        }
        .loading { font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

<header>
    <h1>Chronique des Bigoudens</h1>
    <p>Répertoire dynamique des ancêtres et alliés</p>
</header>

<main>
    <div id="dynamic-index" class="index-grid">
        <p class="loading">Chargement de la lignée...</p>
    </div>
</main>

<footer>
    <p>Projet de sauvegarde de l'histoire familiale - Basé sur les archives Quillec</p>
</footer>

<script>
    // 1. Liste de vos fichiers HTML (ajoutez-en ici dès que vous créez une nouvelle page)
    const pages = [
        'sebastien_quillec.html',
        'jjf_quillec.html',
        'mj_lefailler.html',
        'jean_guitot.html'
    ];

    const container = document.getElementById('dynamic-index');

    async function generateIndex() {
        container.innerHTML = ''; // On vide le message de chargement

        for (const file of pages) {
            try {
                // On récupère le contenu du fichier
                const response = await fetch(file);
                const text = await response.text();
                
                // On crée un document temporaire pour extraire le titre
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                
                // On récupère soit le <title>, soit le <h1>, soit le nom du fichier par défaut
                const pageTitle = doc.querySelector('title')?.innerText || doc.querySelector('h1')?.innerText || file;
                const sosaTag = doc.querySelector('.sosa-main')?.innerText || "Allié";

                // On crée la carte HTML
                const card = document.createElement('a');
                card.href = file;
                card.className = 'card';
                card.innerHTML = `
                    <span style="color: #d4af37; font-weight: bold; font-size: 0.8em;">${sosaTag}</span>
                    <h3>${pageTitle}</h3>
                    <span class="file-name">${file}</span>
                `;
                
                container.appendChild(card);
            } catch (error) {
                console.error("Erreur de chargement pour " + file, error);
            }
        }
    }

    // Lancement de la génération
    generateIndex();
</script>

</body>
</html>
