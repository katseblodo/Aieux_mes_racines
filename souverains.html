<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Timeline Royale - Alignée</title>
    <style>
        :root { --br: #000; --fr: #0055A4; --en: #CE1124; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; margin: 0; }
        
        /* Menu et Header */
        header { background: #2c3e50; color: white; text-align: center; padding: 15px; position: sticky; top: 0; z-index: 10; border-bottom: 3px solid #34495e; }
        #nav-siecles { background: #ecf0f1; padding: 10px; text-align: center; position: sticky; top: 75px; z-index: 10; border-bottom: 1px solid #ddd; }
        .btn-siecle { padding: 5px 12px; margin: 2px; border: none; background: #2c3e50; color: white; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-siecle:hover { background: #34495e; }

        /* Grille */
        .grid-header { 
            display: grid; grid-template-columns: 100px 1fr 1fr 1fr; 
            max-width: 1400px; margin: 0 auto; position: sticky; top: 115px; z-index: 9;
            color: white; font-weight: bold; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .h-date { background: #7f8c8d; padding: 10px; } 
        .h-br { background: var(--br); padding: 10px; } 
        .h-fr { background: var(--fr); padding: 10px; } 
        .h-en { background: var(--en); padding: 10px; }

        .timeline-row { 
            display: grid; grid-template-columns: 100px 1fr 1fr 1fr; 
            max-width: 1400px; margin: 0 auto; background: white; border-bottom: 1px solid #ddd;
        }
        .year-label { background: #f8f9fa; display: flex; align-items: center; justify-content: center; font-weight: bold; border-right: 2px solid #dee2e6; color: #2c3e50; font-size: 1.1rem; }
        
        /* Cartes de souverains */
.cell {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 15px;
    border-right: 1px solid #eee;
    background-color: #fff;
}

.card {
    width: 100%;
    /* Pour éviter que les cartes ne se collent trop */
    border-bottom: 1px solid #f0f0f0; 
    padding-bottom: 10px;
}
        .portrait { width: 60px; height: 75px; float: right; margin-left: 8px; border-radius: 4px; object-fit: cover; border: 1px solid #ddd; background: #eee; }
        .name { font-size: 1rem; font-weight: bold; color: #2c3e50; display: block; margin-bottom: 2px; }
        .maison { color: #7f8c8d; font-style: italic; margin-bottom: 8px; display: block; font-size: 0.8rem; }
        
        .details { background: #f9f9f9; padding: 8px; border-radius: 5px; border-left: 3px solid #ccc; }
        .info-item { display: block; margin-bottom: 3px; color: #555; }
        .label { font-weight: bold; color: #333; }
        .event { margin-top: 8px; font-size: 0.75rem; color: #444; font-style: italic; line-height: 1.4; border-top: 1px solid #eee; padding-top: 5px; }

        /* Ancre pour le menu */
        .anchor { scroll-margin-top: 160px; }
    </style>
</head>
<body>

<div id="menu-container"></div>

<header>
    <h1>Chronologie Royale Comparée</h1>
</header>

<div id="nav-siecles">
    </div>

<div class="grid-header">
    <div class="h-date">Année</div>
    <div class="h-br">Bretagne</div>
    <div class="h-fr">France</div>
    <div class="h-en">Angleterre</div>
</div>

<div id="container"></div>

<script>
async function init() {
    try {
        const response = await fetch('souverains.json?v=' + Date.now());
        if (!response.ok) throw new Error("Erreur lors du chargement du fichier JSON");
        
        const data = await response.json();
        render(data);
        generateMenu(data);
    } catch (e) {
        document.getElementById('container').innerHTML = `<div style="text-align:center; padding:50px; color:red; font-weight:bold;">⚠️ Erreur de chargement des données : ${e.message}</div>`;
        console.error(e);
    }
}

function generateMenu(data) {
    const nav = document.getElementById('nav-siecles');
    const siecles = [...new Set(data.map(s => Math.floor(s.debut / 100) * 100))].sort((a, b) => a - b);
    
    siecles.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'btn-siecle';
        btn.innerText = s + 's';
        btn.onclick = () => document.getElementById('year-' + s)?.scrollIntoView({ behavior: 'smooth' });
        nav.appendChild(btn);
    });
}

function render(data) {
    const container = document.getElementById('container');
    container.innerHTML = ""; 

    // On définit un intervalle (ex: 20 ans) pour regrouper les rois
    const intervalle = 20;
    
    // On trouve la date de début et de fin globale
    const minDate = Math.min(...data.map(s => s.debut));
    const maxDate = Math.max(...data.map(s => s.debut));

    // On génère les lignes par tranches
    for (let t = Math.floor(minDate / intervalle) * intervalle; t <= maxDate; t += intervalle) {
        
        // On vérifie s'il y a au moins un roi qui commence dans cette tranche
        const roisDeLaPeriode = data.filter(s => s.debut >= t && s.debut < t + intervalle);
        
        if (roisDeLaPeriode.length > 0) {
            const row = document.createElement('div');
            row.className = 'timeline-row anchor';
            row.id = 'year-' + t;

            // Colonne Période (ex: 1500 - 1520)
            const y = document.createElement('div');
            y.className = 'year-label';
            y.innerHTML = `<span style="font-size:0.8rem; color:#7f8c8d">${t}</span>`;
            row.appendChild(y);

            // Colonnes Pays
            ['bretagne', 'france', 'angleterre'].forEach(pays => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // On récupère tous les rois du pays commençant dans cette tranche
                const souverainsDuPays = roisDeLaPeriode.filter(item => item.pays === pays);
                
                souverainsDuPays.forEach(s => {
                    const portraitSrc = s.portrait || `https://ui-avatars.com/api/?name=${encodeURIComponent(s.nom)}&background=random`;
                    cell.innerHTML += `
                        <div class="card" style="margin-bottom: 15px; border-bottom: 1px dashed #eee; padding-bottom: 10px;">
                            <img src="${portraitSrc}" class="portrait" alt="${s.nom}">
                            <span class="name">${s.nom}</span>
                            <span class="maison">${s.maison}</span>
                            <div class="details">
                                <span class="info-item">👑 <b>${s.regne}</b></span>
                                <span class="info-item">⏳ <b>${s.vie}</b></span>
                            </div>
                            <div class="event">${s.evenement}</div>
                        </div>
                    `;
                });
                row.appendChild(cell);
            });
            container.appendChild(row);
        }
    }
}
// Initialisation
init();

// Chargement du menu externe
fetch('menu.html')
    .then(res => res.text())
    .then(html => { document.getElementById('menu-container').innerHTML = html; })
    .catch(e => console.log("Pas de menu.html trouvé, ignoré."));
</script>

</body>
</html>
