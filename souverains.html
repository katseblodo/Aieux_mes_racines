<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --color-br: #000000;
            --color-fr: #0055A4;
            --color-en: #CE1124;
        }

        body {
            background-color: #1a1a1a;
            font-family: 'EB Garamond', serif;
            color: #2c1810;
        }

        .parchment {
            background: #f4e4bc;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1), 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #d4c4a8;
            min-height: 100vh;
        }

        .title-gold {
            font-family: 'Cinzel Decorative', cursive;
            color: #8a6d3b;
            text-shadow: 1px 1px 0px #fff;
        }

        .sticky-header {
            background: rgba(244, 228, 188, 0.95);
            backdrop-filter: blur(5px);
            border-bottom: 2px solid #8a6d3b;
        }

        .btn-siecle {
            font-family: 'Cinzel Decorative', cursive;
            transition: all 0.3s;
            border: 1px solid transparent;
            font-size: 0.65rem;
        }

        .btn-siecle:hover, .btn-siecle.active {
            background: #8a6d3b;
            color: #f4e4bc;
            border-color: #4a3728;
        }

        .grid-timeline {
            display: grid;
            grid-template-columns: 70px 1fr 1fr 1fr;
            gap: 1px;
            background: #d4c4a8;
        }

        .cell {
            background: rgba(255, 255, 255, 0.25);
            padding: 10px;
            min-height: 80px;
        }

        .header-cell {
            background: #4a3728;
            color: #f4e4bc;
            font-family: 'Cinzel Decorative', cursive;
            text-align: center;
            padding: 8px;
            position: sticky;
            top: 170px;
            z-index: 10;
            font-size: 0.8rem;
        }

        .century-cell {
            background: #8a6d3b;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            font-size: 0.75rem;
        }

        .sovereign-card {
            background: white;
            border-left: 3px solid #8a6d3b;
            margin-bottom: 6px;
            padding: 6px;
            border-radius: 0 4px 4px 0;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            font-size: 0.8rem;
        }

        .br-border { border-left-color: var(--color-br); }
        .fr-border { border-left-color: var(--color-fr); }
        .en-border { border-left-color: var(--color-en); }

        .tag {
            font-size: 0.5rem;
            text-transform: uppercase;
            font-weight: bold;
            padding: 1px 4px;
            border-radius: 2px;
            margin-bottom: 2px;
            display: inline-block;
        }

        .conflict-tag {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #f87171;
        }
    </style>
</head>
<body class="p-0">

                <h1 class="title-gold text-2xl md:text-3xl">Grand Armorial des Souverains</h1>
                <p class="italic text-stone-600 text-xs">Concordance exhaustive du VIe au XVIe Siècle</p>
            </div>

            <div id="nav-siecles" class="flex flex-wrap justify-center gap-1 border-t border-stone-300 pt-2">
                <!-- Navigation -->

                <div class="header-cell border-l border-[#634a31]"><i class="fa-solid fa-certificate mr-1"></i>France</div>
                <div class="header-cell border-l border-[#634a31]"><i class="fa-solid fa-crown mr-1"></i>Angleterre</div>

                    <!-- Contenu dynamique -->

        function init() {
            const nav = document.getElementById('nav-siecles');
            const body = document.getElementById('timeline-body');
            const siecles = [...new Set(data.map(d => d.siecle))].sort((a,b) => a-b);

            siecles.forEach(s => {
                const btn = document.createElement('button');
                btn.className = "btn-siecle px-2 py-1 rounded";
                btn.innerText = s + "e S.";
                btn.onclick = () => {
                    document.querySelectorAll('.btn-siecle').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById("S" + s).scrollIntoView({ behavior: 'smooth', block: 'center' });
                };
                nav.appendChild(btn);

                const sCell = document.createElement('div');
                sCell.id = "S" + s;
                sCell.className = "century-cell";
                sCell.innerHTML = `<span>${s}<sup>e</sup> Siècle</span>`;
                body.appendChild(sCell);

                ["BRE", "FRA", "ANG"].forEach(p => {
                    const cell = document.createElement('div');
                    cell.className = "cell";
                    const list = data.filter(d => d.siecle === s && d.pays === p);
                    
                    if (list.length === 0) {
                        cell.innerHTML = '<div class="text-[9px] text-stone-400 italic text-center opacity-40 mt-4">Période non renseignée</div>';
                    }

                    list.forEach(sov => {
                        const border = p === "BRE" ? "br-border" : (p === "FRA" ? "fr-border" : "en-border");
                        const tag = p === "BRE" ? "bg-stone-200 text-stone-800" : (p === "FRA" ? "bg-blue-100 text-blue-800" : "bg-red-100 text-red-800");
                        
                        cell.innerHTML += `
                            <div class="sovereign-card ${border}">
                                <div class="flex justify-between">
                                    <span class="tag ${tag}">${sov.maison}</span>
                                    ${sov.conflict ? '<span class="tag conflict-tag">Succession</span>' : ''}
                                </div>
                                <p class="font-bold text-[12px] leading-tight">${sov.nom}</p>
                                <div class="text-[9px] text-stone-500 leading-none mt-1">
                                    <p>Reg : ${sov.regne}</p>
                                    ${sov.vie !== "-" ? `<p>Vie : ${sov.vie}</p>` : ''}
                                </div>
                            </div>
                        `;
                    });
                    body.appendChild(cell);
                });
            });
        }
        window.onload = init;
