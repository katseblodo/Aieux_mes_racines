<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline des Souverains</title>
    <link rel="stylesheet" href="style-souverains.css">
</head>
<body>
    <header>
        <h1>Frise Chronologique des Souverains</h1>
        <div class="filters">
            <button onclick="filterTimeline('all')">Tous</button>
            <button onclick="filterTimeline('bretagne')">Bretagne</button>
            <button onclick="filterTimeline('france')">France</button>
            <button onclick="filterTimeline('angleterre')">Angleterre</button>
        </div>
    </header>

<div class="timeline-container" id="main-container">
    <div class="timeline-column" id="col-bretagne">
        <h2 class="col-title">🏴‍☠️ Bretagne</h2>
        <div class="entries"></div>
    </div>
    <div class="timeline-column" id="col-france">
        <h2 class="col-title">🇫🇷 France</h2>
        <div class="entries"></div>
    </div>
    <div class="timeline-column" id="col-angleterre">
        <h2 class="col-title">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Angleterre</h2>
        <div class="entries"></div>
    </div>
</div>
    <script src="js/script-souverains.js"></script>
</body>
</html>
