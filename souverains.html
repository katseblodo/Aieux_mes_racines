<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Timeline Royale - Alignée</title>
    <style>
        :root { --br: #000; --fr: #0055A4; --en: #CE1124; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        header { background: #2c3e50; color: white; text-align: center; padding: 20px; position: sticky; top: 0; z-index: 10; }
        
        .grid-header { 
            display: grid; grid-template-columns: 100px 1fr 1fr 1fr; 
            max-width: 1200px; margin: 20px auto 0; position: sticky; top: 85px; z-index: 9;
            color: white; font-weight: bold; text-align: center;
        }
        .h-date { background: #7f8c8d; } .h-br { background: var(--br); } .h-fr { background: var(--fr); } .h-en { background: var(--en); }

        .timeline-row { 
            display: grid; grid-template-columns: 100px 1fr 1fr 1fr; 
            max-width: 1200px; margin: 0 auto; background: white; border-bottom: 1px solid #ddd;
        }
        .year-label { background: #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; border-right: 1px solid #ccc; }
        .cell { 
            padding: 5px; 
            min-height: 10px;      
            border-right: 1px solid #f9f9f9; 
        }
       .card { font-size: 0.75rem; line-height: 1.2; }
        .portrait { width: 50px; height: 50px; float: right; margin-left: 10px; border-radius: 4px; }
        .name { font-size: 0.9rem; font-weight: bold; color: #2c3e50; display: block; }
        .maison { color: #7f8c8d; font-style: italic; margin-bottom: 5px; display: block; }
        .details { margin-top: 5px; background: #f9f9f9; padding: 5px; border-radius: 3px; }
        .details div { margin-bottom: 2px; }
        .label { font-weight: bold; color: #34495e; }
        .event { margin-top: 5px; font-size: 0.7rem; border-top: 1px solid #eee; padding-top: 5px; color: #444; }
   </style>
</head>
<body>

<header>
    <h1>Chronologie Royale Comparée</h1>
</header>
<div id="menu-container"></div>
<div class="grid-header">
    <div class="h-date">Année</div>
    <div class="h-br">Bretagne</div>
    <div class="h-fr">France</div>
    <div class="h-en">Angleterre</div>
</div>

<div id="container"></div>

<script>
    async function init() {
        try {
            const res = await fetch('souverains.json');
            const data = await res.json();
            
            // On récupère toutes les dates de début uniques
            const dates = [...new Set(data.map(s => s.debut))].sort((a, b) => a - b);
            const container = document.getElementById('container');

            dates.forEach(date => {
                const row = document.createElement('div');
                row.className = 'timeline-row';

                // Colonne Date
                const y = document.createElement('div');
                y.className = 'year-label';
                y.innerText = date;
                row.appendChild(y);

                // Colonnes Pays
                ['bretagne', 'france', 'angleterre'].forEach(pays => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    const s = data.find(item => item.pays === pays && item.debut === date);
                    if (s) {
                        cell.innerHTML = `
                            <div class="card">
                            <div>
                                <span class="name">${s.nom}</span>
                                <span class="maison" style="display:block">${s.maison}</span>
                            </div>
                        </div>
                        <div class="info-box">
                            <span class="info-item">👑 <span class="label">Règne:</span> ${s.regne}</span>
                            <span class="info-item">⏳ <span class="label">Vie:</span> ${s.vie}</span>
                            <span class="info-item">📍 <span class="label">Né à:</span> ${s.naissance || 'Inconnu'}</span>
                            <span class="info-item">☠️ <span class="label">Mort à:</span> ${s.mort || 'Inconnu'}</span>
                            <div class="event" style="margin-top:5px">${s.evenement}</div>
                        </div>
                        </div>
                    `;
                    }
                    row.appendChild(cell);
                });
                container.appendChild(row);
            });
        } catch (e) {
            console.error("Erreur de chargement JSON:", e);
        }
    }
    init();
</script>
</body>
</html>
